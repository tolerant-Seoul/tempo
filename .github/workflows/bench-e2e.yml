# E2E benchmark job.
#
# Called by bench.yml when mode=e2e. Runs `nu bench-e2e.nu e2e`
# for a baseline/feature comparison using two local validators.

name: bench-e2e

on:
  workflow_dispatch:
    # GitHub Actions supports at most 25 workflow_dispatch inputs; keep this UI-only list capped.
    inputs:
      baseline:
        description: Git ref for the baseline run. Empty = merge-base with main.
        type: string
        required: false
        default: ""
      feature:
        description: Git ref for the feature run. Empty = current branch HEAD.
        type: string
        required: false
        default: ""
      baseline-hardfork:
        description: Latest active hardfork for the baseline run. Empty = latest Tempo hardfork.
        type: string
        required: false
        default: ""
      feature-hardfork:
        description: Latest active hardfork for the feature run. Empty = latest Tempo hardfork.
        type: string
        required: false
        default: ""
      preset:
        description: Benchmark preset.
        type: choice
        required: true
        default: tip20_existing_recipients
        options:
          - tip20
          - tip20_2d_nonces
          - tip20_random_recipients
          - tip20_existing_recipients
          - mpp
          - mix
      duration:
        description: Benchmark duration in seconds.
        type: string
        required: true
        default: "90"
      bloat:
        description: State bloat size in GiB.
        type: choice
        required: true
        default: "100"
        options:
          - "0"
          - "1"
          - "10"
          - "100"
      tps:
        description: Target transactions per second.
        type: string
        required: true
        default: "50000"
      accounts:
        description: Number of benchmark accounts.
        type: string
        required: true
        default: "1000"
      max-concurrent-requests:
        description: Max concurrent sender requests.
        type: string
        required: true
        default: "100"
      txgen-ref:
        description: Optional ref to pin in tempoxyz/txgen.
        type: string
        required: false
        default: ""
      token-count:
        description: Number of TIP20 tokens to use in txgen presets.
        type: string
        required: true
        default: "4"
      profiling:
        description: Profiling.
        type: choice
        required: true
        default: "Off"
        options:
          - "Off"
          - Samply
          - Tracy
          - Both
      otlp:
        description: Export OTLP traces and logs.
        type: boolean
        required: true
        default: true
      valscope:
        description: Generate and publish ValScope static reports.
        type: boolean
        required: true
        default: false
      baseline-args:
        description: Extra args passed only to the baseline node.
        type: string
        required: false
        default: ""
      feature-args:
        description: Extra args passed only to the feature node.
        type: string
        required: false
        default: ""
      gas-limit:
        description: Builder gas limit.
        type: string
        required: true
        default: "1000000000"
      force-bloat:
        description: Force regeneration of local benchmark state.
        type: boolean
        required: true
        default: false
      no-cache:
        description: Skip binary cache.
        type: boolean
        required: true
        default: false
      no-slack:
        description: Skip Slack notification.
        type: boolean
        required: true
        default: true
      bench-args:
        description: Extra bench args.
        type: string
        required: false
        default: ""
      run-pairs:
        description: Number of baseline/feature run pairs.
        type: string
        required: true
        default: "3"
      clickhouse-run:
        description: Benchmark phase that may use the direct ClickHouse reporter.
        type: string
        required: false
        default: "feature-1"
  workflow_call:
    inputs:
      pr:
        type: string
        required: false
      actor:
        type: string
        required: false
      mode:
        type: string
        required: false
        default: e2e
      preset:
        type: string
        required: false
        default: tip20_existing_recipients
      duration:
        type: string
        required: false
        default: "90"
      bloat:
        type: string
        required: false
        default: "100"
      tps:
        type: string
        required: false
        default: "50000"
      accounts:
        type: string
        required: false
        default: "1000"
      max-concurrent-requests:
        type: string
        required: false
        default: "100"
      baseline:
        type: string
        required: false
        default: ""
      feature:
        type: string
        required: false
        default: ""
      baseline-hardfork:
        type: string
        required: false
        default: ""
      feature-hardfork:
        type: string
        required: false
        default: ""
      baseline-features:
        type: string
        required: false
        default: ""
      feature-features:
        type: string
        required: false
        default: ""
      txgen-ref:
        type: string
        required: false
        default: ""
      token-count:
        type: string
        required: false
        default: "4"
      baseline-name:
        type: string
        required: false
        default: ""
      feature-name:
        type: string
        required: false
        default: ""
      samply:
        type: string
        required: false
        default: "false"
      tracy:
        type: string
        required: false
        default: "off"
      tracy-seconds:
        type: string
        required: false
        default: "30"
      tracy-offset:
        type: string
        required: false
        default: "120"
      otlp:
        type: string
        required: false
        default: "true"
      valscope:
        type: string
        required: false
        default: "false"
      baseline-args:
        type: string
        required: false
        default: ""
      feature-args:
        type: string
        required: false
        default: ""
      gas-limit:
        type: string
        required: false
        default: "1000000000"
      run-type:
        type: string
        required: false
        default: dispatch
      force-bloat:
        type: string
        required: false
        default: "false"
      no-cache:
        type: string
        required: false
        default: "false"
      no-slack:
        type: string
        required: false
        default: "true"
      metrics:
        type: string
        required: false
        default: "false"
      bench-args:
        type: string
        required: false
        default: ""
      bench-env:
        type: string
        required: false
        default: ""
      baseline-env:
        type: string
        required: false
        default: ""
      feature-env:
        type: string
        required: false
        default: ""
      run-pairs:
        type: string
        required: false
        default: "3"
      clickhouse-run:
        type: string
        required: false
        default: "feature-1"
      comment-id:
        type: string
        required: false
        default: ""
      pr-head-sha:
        description: Pinned PR head SHA from the ack job.
        type: string
        required: false
        default: ""
      pr-head-ref:
        description: Pinned PR head branch from the ack job.
        type: string
        required: false
        default: ""
    secrets:
      DEREK_BENCH_TOKEN:
        required: false
      TEMPO_TELEMETRY_URL:
        required: false
      GRAFANA_TEMPO:
        required: false
      CLICKHOUSE_URL:
        required: false
      CLICKHOUSE_USER:
        required: false
      CLICKHOUSE_PASSWORD:
        required: false
      BENCH_VICTORIAMETRICS_URL:
        required: false
      VICTORIAMETRICS_URL:
        required: false
      VICTORIALOGS_URL:
        required: false
      SLACK_BENCH_BOT_TOKEN:
        required: false
      SLACK_BENCH_CHANNEL:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench-e2e:
    name: bench-e2e
    runs-on: [self-hosted, Linux, X64, bare-metal-dual-schelk]
    timeout-minutes: 300
    env:
      BENCH_PR: ${{ inputs.pr }}
      BENCH_ACTOR: ${{ inputs.actor || github.actor }}
      BENCH_MODE: ${{ inputs.mode || 'e2e' }}
      BENCH_PRESET: ${{ inputs.preset }}
      BENCH_DURATION: ${{ inputs.duration }}
      BENCH_BLOAT: ${{ inputs.bloat }}
      BENCH_TPS: ${{ inputs.tps }}
      BENCH_ACCOUNTS: ${{ inputs.accounts || '1000' }}
      BENCH_MAX_CONCURRENT_REQUESTS: ${{ inputs.max-concurrent-requests || '500' }}
      BENCH_BASELINE_HARDFORK: ${{ inputs.baseline-hardfork }}
      BENCH_FEATURE_HARDFORK: ${{ inputs.feature-hardfork }}
      BENCH_TXGEN_REF: ${{ inputs.txgen-ref }}
      BENCH_TOKEN_COUNT: ${{ inputs.token-count || '4' }}
      BENCH_SAMPLY: ${{ inputs.profiling == 'Samply' || inputs.profiling == 'Both' || inputs.samply == true || inputs.samply == 'true' }}
      BENCH_TRACY: ${{ (inputs.profiling == 'Tracy' || inputs.profiling == 'Both') && 'on' || ((inputs.profiling == 'Off' || inputs.profiling == 'Samply') && 'off' || inputs.tracy) }}
      BENCH_TRACY_SECONDS: ${{ inputs.tracy-seconds || '30' }}
      BENCH_TRACY_OFFSET: ${{ inputs.tracy-offset || '120' }}
      BENCH_OTLP: ${{ inputs.otlp != false && inputs.otlp != 'false' }}
      BENCH_VALSCOPE: ${{ inputs.valscope == true || inputs.valscope == 'true' }}
      BENCH_FEATURES: ${{ (inputs.otlp != false && inputs.otlp != 'false') && 'jemalloc,asm-keccak,keccak-cache-global,otlp' || 'jemalloc,asm-keccak,keccak-cache-global' }}
      BENCH_BASELINE_FEATURES: ${{ inputs.baseline-features }}
      BENCH_FEATURE_FEATURES: ${{ inputs.feature-features }}
      BENCH_BASELINE_ARGS: ${{ inputs.baseline-args }}
      BENCH_FEATURE_ARGS: ${{ inputs.feature-args }}
      BENCH_GAS_LIMIT: ${{ inputs.gas-limit || '1000000000' }}
      BENCH_RUN_TYPE: ${{ inputs.run-type || 'dispatch' }}
      BENCH_FORCE_BLOAT: ${{ inputs.force-bloat }}
      BENCH_NO_CACHE: ${{ inputs.no-cache || 'false' }}
      BENCH_NO_SLACK: ${{ inputs.no-slack }}
      BENCH_METRICS: ${{ inputs.metrics == true || inputs.metrics == 'true' }}
      BENCH_BENCH_ARGS: ${{ inputs.bench-args }}
      BENCH_BENCH_ENV: ${{ inputs.bench-env }}
      BENCH_BASELINE_ENV: ${{ inputs.baseline-env }}
      BENCH_FEATURE_ENV: ${{ inputs.feature-env }}
      BENCH_RUN_PAIRS: ${{ inputs.run-pairs || '3' }}
      BENCH_CLICKHOUSE_RUN: ${{ inputs.clickhouse-run || 'feature-1' }}
      BENCHMARK_ID: bench-e2e-${{ github.run_id }}
      BENCH_COMMENT_ID: ${{ inputs.comment-id }}
      BENCH_PR_HEAD_SHA: ${{ inputs.pr-head-sha }}
      BENCH_PR_HEAD_REF: ${{ inputs.pr-head-ref }}
      CLICKHOUSE_URL: ${{ secrets.CLICKHOUSE_URL }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      BENCH_VICTORIAMETRICS_URL: ${{ (inputs.metrics == true || inputs.metrics == 'true' || inputs.valscope == true || inputs.valscope == 'true') && secrets.BENCH_VICTORIAMETRICS_URL || '' }}
      VICTORIAMETRICS_URL: ${{ secrets.VICTORIAMETRICS_URL }}
      VICTORIALOGS_URL: ${{ secrets.VICTORIALOGS_URL }}
      VALSCOPE_REPORTS_BASE_URL: ${{ vars.VALSCOPE_REPORTS_BASE_URL }}
      SLACK_BENCH_BOT_TOKEN: ${{ secrets.SLACK_BENCH_BOT_TOKEN }}
      SLACK_BENCH_CHANNEL: ${{ secrets.SLACK_BENCH_CHANNEL }}
    steps:
      - name: Reset workspace directory
        run: |
          sudo rm -rf "$GITHUB_WORKSPACE"
          sudo -u actions-runner mkdir -p "$GITHUB_WORKSPACE"

      - name: Configure OTLP telemetry
        if: env.BENCH_OTLP == 'true'
        env:
          TEMPO_TELEMETRY_URL_SECRET: ${{ secrets.TEMPO_TELEMETRY_URL }}
          GRAFANA_TEMPO_SECRET: ${{ secrets.GRAFANA_TEMPO }}
        run: |
          if [ -n "$TEMPO_TELEMETRY_URL_SECRET" ]; then
            echo "::add-mask::$TEMPO_TELEMETRY_URL_SECRET"
            telemetry_base_no_auth="$(printf '%s' "$TEMPO_TELEMETRY_URL_SECRET" | sed -E 's#^(https?://)[^/@]+@#\1#; s#/*$##')"
            echo "::add-mask::$telemetry_base_no_auth"
            printf 'TEMPO_TELEMETRY_URL=%s\n' "$TEMPO_TELEMETRY_URL_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$GRAFANA_TEMPO_SECRET" ]; then
            echo "::add-mask::$GRAFANA_TEMPO_SECRET"
            printf 'GRAFANA_TEMPO=%s\n' "$GRAFANA_TEMPO_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Mask ClickHouse credentials
        if: env.CLICKHOUSE_URL
        run: |
          echo "::add-mask::$CLICKHOUSE_URL"
          echo "::add-mask::$CLICKHOUSE_PASSWORD"

      - name: Mask VictoriaMetrics URL
        if: env.BENCH_VICTORIAMETRICS_URL
        run: echo "::add-mask::$BENCH_VICTORIAMETRICS_URL"

      - name: Mask ValScope VictoriaMetrics URL
        if: env.VICTORIAMETRICS_URL
        run: echo "::add-mask::$VICTORIAMETRICS_URL"

      - name: Mask VictoriaLogs URL
        if: env.VICTORIALOGS_URL
        run: echo "::add-mask::$VICTORIALOGS_URL"

      - name: Clean up previous results
        run: sudo rm -rf bench-results/ 2>/dev/null || true

      - name: Resolve checkout ref
        id: checkout-ref
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_GITHUB_REF: ${{ github.ref }}
        with:
          script: |
            // workflow_dispatch: always use the branch ref directly
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('ref', process.env.INPUT_GITHUB_REF);
              return;
            }
            // issue_comment: use pinned SHA from ack job
            if (!process.env.BENCH_PR) {
              core.setOutput('ref', process.env.INPUT_GITHUB_REF);
              return;
            }
            const sha = process.env.BENCH_PR_HEAD_SHA;
            if (!sha) {
              core.setFailed('BENCH_PR_HEAD_SHA is not set — ack job must pin the PR head SHA');
              return;
            }
            core.info(`PR #${process.env.BENCH_PR}, using pinned head SHA ${sha}`);
            core.setOutput('ref', sha);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ steps.checkout-ref.outputs.ref }}

      - name: Checkout ValScope report builder
        if: env.BENCH_VALSCOPE == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: tempoxyz/valscope
          ref: main
          path: valscope
          persist-credentials: false
          token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}

      - name: Resolve job URL and update status
        if: env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BASELINE_NAME: ${{ inputs.baseline-name }}
          INPUT_FEATURE_NAME: ${{ inputs.feature-name }}
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const job = jobs.jobs.find(j => j.name === 'bench-e2e');
            const jobUrl = job ? job.html_url : `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            core.exportVariable('BENCH_JOB_URL', jobUrl);

            const mode = process.env.BENCH_MODE;
            const preset = process.env.BENCH_PRESET;
            const duration = process.env.BENCH_DURATION;
            const bloat = process.env.BENCH_BLOAT;
            const tps = process.env.BENCH_TPS;
            const accounts = process.env.BENCH_ACCOUNTS;
            const maxConcurrentRequests = process.env.BENCH_MAX_CONCURRENT_REQUESTS;
            const baselineHardfork = process.env.BENCH_BASELINE_HARDFORK || '';
            const featureHardfork = process.env.BENCH_FEATURE_HARDFORK || '';
            const baselineFeatureFlags = process.env.BENCH_BASELINE_FEATURES || '';
            const featureFeatureFlags = process.env.BENCH_FEATURE_FEATURES || '';
            const baseline = process.env.INPUT_BASELINE_NAME;
            const feature = process.env.INPUT_FEATURE_NAME;
            const txgenRef = process.env.BENCH_TXGEN_REF || 'default';
            const tokenCount = process.env.BENCH_TOKEN_COUNT || '4';
            const samply = process.env.BENCH_SAMPLY === 'true';
            const samplyNote = samply ? ', samply: `enabled`' : '';
            const tracy = process.env.BENCH_TRACY;
            const tracyNote = tracy !== 'off' ? `, tracy: \`${tracy}\`` : '';
            const otlp = process.env.BENCH_OTLP === 'true';
            const otlpNote = otlp ? ', otlp: `enabled`' : ', otlp: `disabled`';
            const valscope = process.env.BENCH_VALSCOPE === 'true';
            const valscopeNote = valscope ? ', valscope: `enabled`' : ', valscope: `disabled`';
            const noCache = process.env.BENCH_NO_CACHE === 'true';
            const noCacheNote = noCache ? ', no-cache: `true`' : '';
            const gasLimit = process.env.BENCH_GAS_LIMIT;
            const runPairs = process.env.BENCH_RUN_PAIRS || '2';
            const hardforkNote = (baselineHardfork || featureHardfork) ? `, baseline-hardfork: \`${baselineHardfork}\`, feature-hardfork: \`${featureHardfork}\`` : '';
            const featureFlagsNote = `${baselineFeatureFlags ? `, baseline-features: \`${baselineFeatureFlags}\`` : ''}${featureFeatureFlags ? `, feature-features: \`${featureFeatureFlags}\`` : ''}`;
            core.exportVariable('BENCH_CONFIG', `**Config:** mode: \`${mode}\`, preset: \`${preset}\`, duration: \`${duration}s\`, bloat: \`${bloat} GiB\`, token-count: \`${tokenCount}\`, tps: \`${tps}\`, accounts: \`${accounts}\`, max-concurrent-requests: \`${maxConcurrentRequests}\`, gas-limit: \`${gasLimit}\`, run-pairs: \`${runPairs}\`, baseline: \`${baseline}\`, feature: \`${feature}\`, txgen-ref: \`${txgenRef}\`${hardforkNote}${featureFlagsNote}${samplyNote}${tracyNote}${otlpNote}${valscopeNote}${noCacheNote}`);

            const { buildBody } = require('./.github/scripts/bench-update-status.js');
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.BENCH_COMMENT_ID),
              body: buildBody('Resolving refs...'),
            });

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
        continue-on-error: true

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install txgen
        env:
          TXGEN_GIT_TOKEN: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
        run: |
          CARGO_BIN_DIR="${CARGO_HOME:-$HOME/.cargo}/bin"
          echo "$CARGO_BIN_DIR" >> "$GITHUB_PATH"
          export PATH="$CARGO_BIN_DIR:$PATH"

          TXGEN_GIT_URL="https://x-access-token:${TXGEN_GIT_TOKEN}@github.com/tempoxyz/txgen"
          install_args=(--git "$TXGEN_GIT_URL" --locked)
          if [ -n "$BENCH_TXGEN_REF" ]; then
            TXGEN_REV="$(git ls-remote "$TXGEN_GIT_URL" "$BENCH_TXGEN_REF" "refs/heads/$BENCH_TXGEN_REF" "refs/tags/$BENCH_TXGEN_REF" | awk 'BEGIN { rev = "" } /\^\{\}$/ { rev = $1; exit } rev == "" { rev = $1 } END { if (rev != "") print rev }')"
            install_args+=(--rev "${TXGEN_REV:-$BENCH_TXGEN_REF}")
          fi

          cargo install "${install_args[@]}" txgen-tempo bench-cli
          echo "TXGEN_TEMPO_BIN=$CARGO_BIN_DIR/txgen-tempo" >> "$GITHUB_ENV"
          echo "TXGEN_BENCH_BIN=$CARGO_BIN_DIR/bench" >> "$GITHUB_ENV"
          command -v txgen-tempo
          command -v bench

      - name: Resolve PR head branch
        id: pr-info
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_REF_NAME: ${{ github.ref_name }}
          INPUT_SHA: ${{ github.sha }}
        with:
          script: |
            if (process.env.BENCH_PR) {
              const ref = process.env.BENCH_PR_HEAD_REF || process.env.INPUT_REF_NAME;
              const sha = process.env.BENCH_PR_HEAD_SHA || process.env.INPUT_SHA;
              core.setOutput('head-ref', ref);
              core.setOutput('head-sha', sha);
            } else {
              core.setOutput('head-ref', process.env.INPUT_REF_NAME);
              core.setOutput('head-sha', process.env.INPUT_SHA);
            }

      - name: Resolve baseline and feature refs
        id: refs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
         INPUT_BASELINE: ${{ inputs.baseline }}
         INPUT_FEATURE: ${{ inputs.feature }}
         INPUT_BASELINE_NAME: ${{ inputs.baseline-name }}
         INPUT_FEATURE_NAME: ${{ inputs.feature-name }}
         INPUT_SHA: ${{ github.sha }}
         INPUT_PR_HEAD_SHA: ${{ steps.pr-info.outputs.head-sha }}
         INPUT_PR_HEAD_REF: ${{ steps.pr-info.outputs.head-ref }}
        with:
         script: |
           const { execSync } = require('child_process');
           const run = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim();

           const baselineArg = process.env.INPUT_BASELINE;
           const featureArg = process.env.INPUT_FEATURE;
           const baselineNameArg = process.env.INPUT_BASELINE_NAME;
           const featureNameArg = process.env.INPUT_FEATURE_NAME;

           let baselineRef, baselineName, featureRef, featureName;

           if (baselineArg) {
             try { run(`git fetch origin "${baselineArg}" --quiet`); } catch {}
             try {
               baselineRef = run(`git rev-parse "${baselineArg}"`);
             } catch {
               baselineRef = run(`git rev-parse "origin/${baselineArg}"`);
             }
             baselineName = baselineNameArg || baselineArg;
           } else {
             try {
               baselineRef = run('git merge-base HEAD origin/main');
             } catch {
               baselineRef = process.env.INPUT_SHA;
             }
             baselineName = baselineNameArg || 'main';
           }

           if (featureArg) {
             try { run(`git fetch origin "${featureArg}" --quiet`); } catch {}
             try {
               featureRef = run(`git rev-parse "${featureArg}"`);
             } catch {
               featureRef = run(`git rev-parse "origin/${featureArg}"`);
             }
             featureName = featureNameArg || featureArg;
           } else {
             featureRef = process.env.INPUT_PR_HEAD_SHA;
             featureName = featureNameArg || process.env.INPUT_PR_HEAD_REF;
           }

            core.setOutput('baseline-ref', baselineRef);
            core.setOutput('baseline-name', baselineName);
            core.setOutput('feature-ref', featureRef);
            core.setOutput('feature-name', featureName);

      - name: Resolve PR attribution
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
        with:
          script: |
            let pr = process.env.BENCH_PR || '';
            if (!pr) {
              const featureRef = process.env.INPUT_FEATURE_REF;
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: featureRef,
                });
                const openPr = prs.find(candidate => candidate.state === 'open');
                if (openPr) {
                  pr = String(openPr.number);
                  core.info(`Using PR #${pr} for feature ref ${featureRef}`);
                }
              } catch (error) {
                core.info(`No PR associated with feature ref ${featureRef}: ${error.message}`);
              }
            }
            core.exportVariable('BENCH_PR', pr);

      - name: Create dispatch PR comment
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_BASELINE_NAME: ${{ steps.refs.outputs.baseline-name }}
          INPUT_FEATURE_NAME: ${{ steps.refs.outputs.feature-name }}
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            if (process.env.BENCH_COMMENT_ID || !process.env.BENCH_PR) {
              return;
            }

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const job = jobs.jobs.find(j => j.name === 'bench-e2e');
            const jobUrl = job ? job.html_url : `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            core.exportVariable('BENCH_JOB_URL', jobUrl);

            const mode = process.env.BENCH_MODE;
            const preset = process.env.BENCH_PRESET;
            const duration = process.env.BENCH_DURATION;
            const bloat = process.env.BENCH_BLOAT;
            const tps = process.env.BENCH_TPS;
            const accounts = process.env.BENCH_ACCOUNTS;
            const maxConcurrentRequests = process.env.BENCH_MAX_CONCURRENT_REQUESTS;
            const baselineHardfork = process.env.BENCH_BASELINE_HARDFORK || '';
            const featureHardfork = process.env.BENCH_FEATURE_HARDFORK || '';
            const baselineFeatureFlags = process.env.BENCH_BASELINE_FEATURES || '';
            const featureFeatureFlags = process.env.BENCH_FEATURE_FEATURES || '';
            const baseline = process.env.INPUT_BASELINE_NAME;
            const feature = process.env.INPUT_FEATURE_NAME;
            const txgenRef = process.env.BENCH_TXGEN_REF || 'default';
            const tokenCount = process.env.BENCH_TOKEN_COUNT || '4';
            const samply = process.env.BENCH_SAMPLY === 'true';
            const samplyNote = samply ? ', samply: `enabled`' : '';
            const tracy = process.env.BENCH_TRACY;
            const tracyNote = tracy !== 'off' ? `, tracy: \`${tracy}\`` : '';
            const otlp = process.env.BENCH_OTLP === 'true';
            const otlpNote = otlp ? ', otlp: `enabled`' : ', otlp: `disabled`';
            const valscope = process.env.BENCH_VALSCOPE === 'true';
            const valscopeNote = valscope ? ', valscope: `enabled`' : ', valscope: `disabled`';
            const noCache = process.env.BENCH_NO_CACHE === 'true';
            const noCacheNote = noCache ? ', no-cache: `true`' : '';
            const gasLimit = process.env.BENCH_GAS_LIMIT;
            const runPairs = process.env.BENCH_RUN_PAIRS || '2';
            const hardforkNote = (baselineHardfork || featureHardfork) ? `, baseline-hardfork: \`${baselineHardfork}\`, feature-hardfork: \`${featureHardfork}\`` : '';
            const featureFlagsNote = `${baselineFeatureFlags ? `, baseline-features: \`${baselineFeatureFlags}\`` : ''}${featureFeatureFlags ? `, feature-features: \`${featureFeatureFlags}\`` : ''}`;
            const config = `**Config:** mode: \`${mode}\`, preset: \`${preset}\`, duration: \`${duration}s\`, bloat: \`${bloat} GiB\`, token-count: \`${tokenCount}\`, tps: \`${tps}\`, accounts: \`${accounts}\`, max-concurrent-requests: \`${maxConcurrentRequests}\`, gas-limit: \`${gasLimit}\`, run-pairs: \`${runPairs}\`, baseline: \`${baseline}\`, feature: \`${feature}\`, txgen-ref: \`${txgenRef}\`${hardforkNote}${featureFlagsNote}${samplyNote}${tracyNote}${otlpNote}${valscopeNote}${noCacheNote}`;
            core.exportVariable('BENCH_CONFIG', config);

            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.BENCH_PR),
              body: `cc @${process.env.BENCH_ACTOR}\n\n🚀 Benchmark started! [View job](${jobUrl})\n\n⏳ **Status:** Running benchmark...\n\n${config}`,
            });
            core.exportVariable('BENCH_COMMENT_ID', String(comment.id));

      - name: Update status (running benchmark)
        if: success() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            const s = require('./.github/scripts/bench-update-status.js');
            await s({github, context, status: 'Running benchmark...'});

      - name: Run e2e benchmark
        id: bench
        env:
          BASELINE_REF: ${{ steps.refs.outputs.baseline-ref }}
          FEATURE_REF: ${{ steps.refs.outputs.feature-ref }}
          BENCH_GH_TOKEN: ${{ secrets.DEREK_BENCH_TOKEN }}
        run: |
          if [ "$BENCH_OTLP" != "true" ]; then
            unset TEMPO_TELEMETRY_URL
            unset GRAFANA_TEMPO
            unset OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
            unset OTEL_EXPORTER_OTLP_HEADERS
          fi
          if ! [[ "$BENCH_RUN_PAIRS" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::run-pairs must be a positive integer"
            exit 1
          fi
          if ! [[ "$BENCH_TOKEN_COUNT" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::token-count must be a positive integer"
            exit 1
          fi
          if [ "$BENCH_TOKEN_COUNT" -gt 4 ]; then
            echo "::error::token-count must be <= 4, matching the TIP20 tokens available in state bloat"
            exit 1
          fi
          cmd=(nu bench-e2e.nu e2e)
          cmd+=(
            --preset "$BENCH_PRESET"
            --bloat "$BENCH_BLOAT"
            --token-count "$BENCH_TOKEN_COUNT"
            --duration "$BENCH_DURATION"
            --run-pairs "$BENCH_RUN_PAIRS"
            --tps "$BENCH_TPS"
            --accounts "$BENCH_ACCOUNTS"
            --max-concurrent-requests "$BENCH_MAX_CONCURRENT_REQUESTS"
            --gas-limit "$BENCH_GAS_LIMIT"
            --baseline "$BASELINE_REF"
            --feature "$FEATURE_REF"
            --baseline-name "${{ steps.refs.outputs.baseline-name }}"
            --feature-name "${{ steps.refs.outputs.feature-name }}"
            --tune
            --no-default-features
            --features "$BENCH_FEATURES"
            --skip-summary
          )
          [ "$BENCH_FORCE_BLOAT" = "true" ] && cmd+=(--force-bloat)
          [ "$BENCH_NO_CACHE" = "true" ] && cmd+=(--no-cache)
          [ "$BENCH_SAMPLY" = "true" ] && cmd+=(--samply)
          [ "$BENCH_TRACY" != "off" ] && cmd+=(--tracy "$BENCH_TRACY" --tracy-seconds "$BENCH_TRACY_SECONDS" --tracy-offset "$BENCH_TRACY_OFFSET")
          [ -n "$BENCH_BASELINE_HARDFORK" ] && cmd+=(--baseline-hardfork="$BENCH_BASELINE_HARDFORK")
          [ -n "$BENCH_FEATURE_HARDFORK" ] && cmd+=(--feature-hardfork="$BENCH_FEATURE_HARDFORK")
          [ -n "$BENCH_BASELINE_FEATURES" ] && cmd+=(--baseline-features="$BENCH_BASELINE_FEATURES")
          [ -n "$BENCH_FEATURE_FEATURES" ] && cmd+=(--feature-features="$BENCH_FEATURE_FEATURES")
          [ -n "$BENCH_BASELINE_ARGS" ] && cmd+=(--baseline-args="$BENCH_BASELINE_ARGS")
          [ -n "$BENCH_FEATURE_ARGS" ] && cmd+=(--feature-args="$BENCH_FEATURE_ARGS")
          [ -n "$BENCH_BENCH_ARGS" ] && cmd+=(--bench-args="$BENCH_BENCH_ARGS")
          [ -n "$BENCH_BENCH_ENV" ] && cmd+=(--bench-env="$BENCH_BENCH_ENV")
          [ -n "$BENCH_BASELINE_ENV" ] && cmd+=(--baseline-env="$BENCH_BASELINE_ENV")
          [ -n "$BENCH_FEATURE_ENV" ] && cmd+=(--feature-env="$BENCH_FEATURE_ENV")
          { [ "$BENCH_METRICS" = "true" ] || [ "$BENCH_VALSCOPE" = "true" ]; } && [ -n "$BENCH_VICTORIAMETRICS_URL" ] && cmd+=(--victoriametrics-url "$BENCH_VICTORIAMETRICS_URL")
          [ -n "$CLICKHOUSE_URL" ] && cmd+=(--clickhouse-url "$CLICKHOUSE_URL")
          [ -n "$BENCH_RUN_TYPE" ] && cmd+=(--run-type "$BENCH_RUN_TYPE")
          [ -n "$BENCH_CLICKHOUSE_RUN" ] && cmd+=(--clickhouse-run "$BENCH_CLICKHOUSE_RUN")
          if [ "$BENCH_VALSCOPE" = "true" ]; then
            if [ ! -f "valscope/apps/api/Cargo.toml" ]; then
              echo "::error::ValScope static report builder not found"
              exit 1
            fi
            cmd+=(--valscope-static-report --valscope-dir "valscope")
          fi

          quote_arg() {
            local value="$1"
            if [[ "$value" =~ ^[A-Za-z0-9._/:=@+-]+$ ]]; then
              printf '%s' "$value"
            else
              printf "'%s'" "${value//\'/\'\\\'\'}"
            fi
          }

          quote_derek_arg() {
            local arg="$1"
            if [[ "$arg" == *=* ]]; then
              local name="${arg%%=*}"
              local value="${arg#*=}"
              if [[ "$value" =~ ^[A-Za-z0-9._/:=@+-]+$ ]]; then
                printf '%s=%s' "$name" "$value"
              else
                value="${value//\\/\\\\}"
                value="${value//\"/\\\"}"
                printf '%s=\"%s\"' "$name" "$value"
              fi
            else
              quote_arg "$arg"
            fi
          }

          derek_cmd=(derek bench mode="$BENCH_MODE")
          derek_cmd+=(
            preset="$BENCH_PRESET"
            duration="$BENCH_DURATION"
            bloat="$BENCH_BLOAT"
            token-count="$BENCH_TOKEN_COUNT"
            tps="$BENCH_TPS"
            accounts="$BENCH_ACCOUNTS"
            max-concurrent-requests="$BENCH_MAX_CONCURRENT_REQUESTS"
            baseline="${{ steps.refs.outputs.baseline-name }}"
            feature="${{ steps.refs.outputs.feature-name }}"
            baseline-hardfork="$BENCH_BASELINE_HARDFORK"
            feature-hardfork="$BENCH_FEATURE_HARDFORK"
            gas-limit="$BENCH_GAS_LIMIT"
            run-pairs="$BENCH_RUN_PAIRS"
            otlp="$BENCH_OTLP"
            metrics="$BENCH_METRICS"
            no-cache="$BENCH_NO_CACHE"
            force-bloat="$BENCH_FORCE_BLOAT"
          )
          [ -n "$BENCH_TXGEN_REF" ] && derek_cmd+=(txgen-ref="$BENCH_TXGEN_REF")
          [ "$BENCH_SAMPLY" = "true" ] && derek_cmd+=(samply)
          [ "$BENCH_TRACY" != "off" ] && derek_cmd+=(tracy="$BENCH_TRACY" tracy-seconds="$BENCH_TRACY_SECONDS" tracy-offset="$BENCH_TRACY_OFFSET")
          [ -n "$BENCH_BASELINE_FEATURES" ] && derek_cmd+=(baseline-features="$BENCH_BASELINE_FEATURES")
          [ -n "$BENCH_FEATURE_FEATURES" ] && derek_cmd+=(feature-features="$BENCH_FEATURE_FEATURES")
          [ -n "$BENCH_BASELINE_ARGS" ] && derek_cmd+=(baseline-args="$BENCH_BASELINE_ARGS")
          [ -n "$BENCH_FEATURE_ARGS" ] && derek_cmd+=(feature-args="$BENCH_FEATURE_ARGS")
          [ -n "$BENCH_BENCH_ARGS" ] && derek_cmd+=(bench-args="$BENCH_BENCH_ARGS")
          [ -n "$BENCH_BENCH_ENV" ] && derek_cmd+=(bench-env="$BENCH_BENCH_ENV")
          [ -n "$BENCH_BASELINE_ENV" ] && derek_cmd+=(baseline-env="$BENCH_BASELINE_ENV")
          [ -n "$BENCH_FEATURE_ENV" ] && derek_cmd+=(feature-env="$BENCH_FEATURE_ENV")
          DEREK_BENCH_COMMAND=""
          for arg in "${derek_cmd[@]}"; do
            if [ -n "$DEREK_BENCH_COMMAND" ]; then
              DEREK_BENCH_COMMAND+=" "
            fi
            DEREK_BENCH_COMMAND+="$(quote_derek_arg "$arg")"
          done
          export DEREK_BENCH_COMMAND
          echo "DEREK_BENCH_COMMAND=$DEREK_BENCH_COMMAND" >> "$GITHUB_ENV"

          "${cmd[@]}"

      - name: Generate e2e summary
        id: results-dir
        if: success()
        run: |
          RESULTS_DIR=$(find bench-results -mindepth 1 -maxdepth 1 -type d | sort | tail -1)
          if [ -z "$RESULTS_DIR" ]; then
            echo "::error::No results directory found"
            exit 1
          fi
          nu bench-e2e.nu summarize "$RESULTS_DIR"
          echo "path=$RESULTS_DIR" >> "$GITHUB_OUTPUT"
          echo "Results directory: $RESULTS_DIR"

      - name: Publish ValScope static reports
        id: publish-valscope-static
        if: success() && env.BENCH_VALSCOPE == 'true' && steps.results-dir.outputs.path != '' && hashFiles('bench-results/*/valscope-static/index.html') != ''
        env:
          BENCH_RESULTS_DIR: ${{ steps.results-dir.outputs.path }}
        run: |
          rm -rf tempo-bench-valscope-static
          cp -a "$BENCH_RESULTS_DIR/valscope-static" tempo-bench-valscope-static
          destination="valscope-bench/valscope-bench-reports-dev/${BENCHMARK_ID}"
          mc cp --recursive tempo-bench-valscope-static/ "$destination"
          if [ -n "${VALSCOPE_REPORTS_BASE_URL:-}" ]; then
            echo "url=${VALSCOPE_REPORTS_BASE_URL%/}/${BENCHMARK_ID}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tempo-bench-results
          path: bench-results/

      - name: Post results to PR
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BENCH_RESULTS_DIR: ${{ steps.results-dir.outputs.path }}
          BENCH_VALSCOPE_PUBLISHED_URL: ${{ steps.publish-valscope-static.outputs.url }}
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const resultsDir = process.env.BENCH_RESULTS_DIR;

            let summary = '';
            try {
              summary = fs.readFileSync(`${resultsDir}/summary.md`, 'utf8');
            } catch (e) {
              summary = '⚠️ Benchmark completed but failed to read summary.';
            }

            let valscopeLine = '';
            try {
              const publishedUrl = process.env.BENCH_VALSCOPE_PUBLISHED_URL || '';
              const publishedBase = publishedUrl ? (publishedUrl.endsWith('/') ? publishedUrl : `${publishedUrl}/`) : '';
              if (publishedBase) {
                const manifest = JSON.parse(fs.readFileSync(`${resultsDir}/valscope-static/reports.json`, 'utf8'));
                const links = (manifest.runs || []).map(run => {
                  return `[${run.run}](${new URL(run.path, publishedBase).toString()})`;
                });
                if (links.length > 0) {
                  valscopeLine = `- ValScope: ${links.join(' | ')}\n`;
                }
              }
            } catch (e) {}

            // Compute observability URLs from summary.json.
            let grafanaSection = '';
            let resultHeadline = '✅ Benchmark complete!';
            try {
              const meta = JSON.parse(fs.readFileSync(`${resultsDir}/summary.json`, 'utf8'));
              if (meta.classification?.label) {
                resultHeadline = `${meta.classification.emoji || '✅'} Benchmark complete: ${meta.classification.label}`;
              }
              const benchId = meta.benchmark_id;
              const metricsRange = meta.observability_range || {};
              const actualRange = meta.actual_observability_range || metricsRange;
              const metricsFrom = metricsRange.from || (metricsRange.from_ms ? String(metricsRange.from_ms) : '');
              const metricsTo = metricsRange.to || (metricsRange.to_ms ? String(metricsRange.to_ms) : '');
              const actualFrom = actualRange.from || (actualRange.from_ms ? String(actualRange.from_ms) : '');
              const actualTo = actualRange.to || (actualRange.to_ms ? String(actualRange.to_ms) : '');
              if (benchId && metricsFrom && metricsTo && actualFrom && actualTo) {
                const traceqlQuery = `{resource.benchmark_id="${benchId}"}`;
                const grafanaUrl = meta.grafana_url || `https://tempoxyz.grafana.net/d/dffj6qf1o30oowe/performance?orgId=1&from=${encodeURIComponent(metricsFrom)}&to=${encodeURIComponent(metricsTo)}&timezone=browser&var-datasource=efk1hcn87dnnkd&var-filter_label=benchmark_id&var-filter_value=${encodeURIComponent(benchId)}&var-group_by=benchmark_run`;
                const internalPerfUrl = meta.internal_perf_url || '';
                const logsPane = JSON.stringify({
                  pw4: {
                    datasource: 'cfk1hzy08xekgd',
                    queries: [{
                      refId: 'A',
                      datasource: { type: 'victoriametrics-logs-datasource', uid: 'cfk1hzy08xekgd' },
                      editorMode: 'code',
                      expr: `benchmark_id:${benchId}`,
                      queryType: 'instant',
                    }],
                    range: { from: actualFrom, to: actualTo },
                    panelsState: { logs: { sortOrder: 'Descending', columns: ['Time', 'Line'], visualisationType: 'table', labelFieldName: 'labels' } },
                    compact: false,
                  },
                });
                const logsUrl = `https://tempoxyz.grafana.net/explore?schemaVersion=1&panes=${encodeURIComponent(logsPane)}&orgId=1`;
                const tracesPane = JSON.stringify({
                  g39: {
                    datasource: 'dfk1hrnxca9s0a',
                    queries: [{
                      refId: 'A',
                      datasource: { type: 'tempo', uid: 'dfk1hrnxca9s0a' },
                      queryType: 'traceqlSearch',
                      serviceMapUseNativeHistograms: false,
                      filters: [
                        { id: 'benchmark-id', operator: '=', scope: 'resource', tag: 'benchmark_id', value: [benchId], valueType: 'string', isCustomValue: true },
                      ],
                      query: traceqlQuery,
                    }],
                    range: { from: actualFrom, to: actualTo },
                    panelsState: { logs: { visualisationType: 'table' } },
                    compact: false,
                  },
                });
                const tracesUrl = `https://tempoxyz.grafana.net/explore?schemaVersion=1&panes=${encodeURIComponent(tracesPane)}&orgId=1`;
                const internalPerfLine = internalPerfUrl ? `- [Internal dashboard](${internalPerfUrl})\n` : '';
                const grafanaLine = process.env.BENCH_METRICS === 'true' ? `- [Grafana](${grafanaUrl})\n` : '';
                grafanaSection = `\n\n### Observability\n\n${internalPerfLine}${grafanaLine}- [Logs](${logsUrl})\n- [Traces](${tracesUrl})\n${valscopeLine}`;
              }
            } catch (e) {}

            let runs = [];
            try {
              runs = fs.readFileSync(`${resultsDir}/run-order.txt`, 'utf8')
                .split(/\r?\n/)
                .map(run => run.trim())
                .filter(run => run && fs.existsSync(`${resultsDir}/report-${run}.json`));
            } catch (e) {}
            if (runs.length === 0) {
              runs = fs.readdirSync(resultsDir)
                .map(name => /^report-(.+)\.json$/.exec(name)?.[1])
                .filter(Boolean)
                .sort();
            }

            // Samply profile links (URLs produced by tempo.nu upload-samply-profile)
            let samplySection = '';
            if (process.env.BENCH_SAMPLY === 'true') {
              const links = [];
              for (const run of runs) {
                for (const role of ['a', 'b']) {
                  try {
                    const url = fs.readFileSync(`${resultsDir}/profile-${run}-${role}-url.txt`, 'utf8').trim();
                    if (url) links.push(`- **${run} / ${role}**: [Firefox Profiler](${url})`);
                  } catch (e) {}
                }
              }
              if (links.length > 0) {
                samplySection = `\n\n### Samply Profiles\n\n${links.join('\n')}\n`;
              }
            }

            // Tracy profile links (URLs produced by tempo.nu upload-tracy-profile).
            // Single-runner e2e captures both local validators in one phase-level file.
            let tracySection = '';
            if (process.env.BENCH_TRACY && process.env.BENCH_TRACY !== 'off') {
              const links = [];
              for (const run of runs) {
                try {
                  const url = fs.readFileSync(`${resultsDir}/tracy-${run}-url.txt`, 'utf8').trim();
                  if (url) links.push(`- **${run} / local validators**: [Tracy Viewer](${url})`);
                } catch (e) {}
              }
              if (links.length > 0) {
                tracySection = `\n\n### Tracy Profiles\n\n${links.join('\n')}\n`;
              }
            }

            const jobUrl = process.env.BENCH_JOB_URL || `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `cc @${process.env.BENCH_ACTOR}\n\n${resultHeadline} [View job](${jobUrl})\n\n${summary}${grafanaSection}${samplySection}${tracySection}`;
            const ackCommentId = process.env.BENCH_COMMENT_ID;

            if (ackCommentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(ackCommentId),
                body,
              });
            }

            await core.summary.addRaw(body).write();

      - name: Send Slack notification (success)
        if: success() && steps.results-dir.outputs.path && env.BENCH_NO_SLACK != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BENCH_WORK_DIR: ${{ steps.results-dir.outputs.path }}
          BENCH_BASELINE_NAME: ${{ steps.refs.outputs.baseline-name }}
          BENCH_FEATURE_NAME: ${{ steps.refs.outputs.feature-name }}
        with:
          script: |
            const notify = require('./.github/scripts/bench-slack-notify.js');
            await notify.e2e.success({ core, context });

      - name: Send Slack notification (failure)
        if: failure() && env.BENCH_NO_SLACK != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const notify = require('./.github/scripts/bench-slack-notify.js');
            await notify.e2e.failure({ core, context, failedStep: 'running benchmark' });

      - name: Update status (failed)
        if: failure() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            const jobUrl = process.env.BENCH_JOB_URL || `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.BENCH_COMMENT_ID),
              body: `cc @${process.env.BENCH_ACTOR}\n\n❌ Benchmark failed. [View logs](${jobUrl})`,
            });

      - name: Update status (cancelled)
        if: cancelled() && env.BENCH_COMMENT_ID
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
          script: |
            const jobUrl = process.env.BENCH_JOB_URL || `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.BENCH_COMMENT_ID),
              body: `cc @${process.env.BENCH_ACTOR}\n\n⚠️ Benchmark cancelled. [View logs](${jobUrl})`,
            });
